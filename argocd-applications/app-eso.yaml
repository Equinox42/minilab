apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.4.1 
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/platform/external-secrets-operator/external-secrets-operator-values.yaml
    - repoURL: https://github.com/Equinox42/minilab
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Equinox42/minilab
      targetRevision: main
      path: ./platform/external-secrets-operator/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

