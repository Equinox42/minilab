# https://github.com/ionos-cloud/cluster-api-provider-proxmox/blob/main/docs/Usage.md#quick-start
## -- Controller settings -- ##
PROXMOX_URL: "https://X.X.X.X:8006"                     # The Proxmox VE host.
PROXMOX_TOKEN: 'capmox@pve!capi'                            # The Proxmox VE TokenID for authentication.
PROXMOX_SECRET: ""        # The secret associated with the TokenID.


## -- Required workload cluster default settings -- ##
PROXMOX_SOURCENODE: "proxmox"                                 # The node that hosts the VM template to be used to provision VMs.
TEMPLATE_VMID: "108"                                          # The template VM ID used for cloning VMs.
ALLOWED_NODES: "[proxmox]"                                    # The Proxmox VE nodes used for VM deployments.
VM_SSH_KEYS: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKUZfG8WxhlYcmTGPeO+2xFAL9+EdBtagd1Oyp8Mx3Qs"  # The ssh authorized keys used to ssh to the machines.

## -- networking configuration-- ##
CONTROL_PLANE_ENDPOINT_IP: "192.168.1.149"                       # The IP that kube-vip is going to use as a control plane endpoint.
NODE_IP_RANGES: "[192.168.1.150-192.168.1.160]"               # The IP ranges for Cluster nodes.
GATEWAY: "192.168.1.1"                                        # The gateway for the machines network-config..
IP_PREFIX: "24"                                               # Subnet Mask in CIDR notation for your node IP ranges.
DNS_SERVERS: "[192.168.1.102]"                                # The dns nameservers for the machines network-config.
BRIDGE: "vmbr0"                                               # The network bridge device for Proxmox VE VMs.

## -- xl nodes -- ##
BOOT_VOLUME_DEVICE: "scsi0"                                   # The device used for the boot disk.
BOOT_VOLUME_SIZE: "50"                                        # The size of the boot disk in GB.
NUM_SOCKETS: "1"                                              # The number of sockets for the VMs.
NUM_CORES: "3"                                                # The number of cores for the VMs.
MEMORY_MIB: "8048"                                            # The memory size for the VMs.

EXP_CLUSTER_RESOURCE_SET: "true"                              # This enables the ClusterResourceSet feature that we are using to deploy CNI.
CLUSTER_TOPOLOGY: "true"                                      # This enables experimental ClusterClass templating.
EXP_KUBEADM_BOOTSTRAP_FORMAT_IGNITION: "true"                    # This enables kubeadm ignition format for cluster-api bootstrap-controller
