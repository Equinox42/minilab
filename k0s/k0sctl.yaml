apiVersion: k0sctl.k0sproject.io/v1beta1
kind: Cluster
metadata:
  name: ${CLUSTER_NAME}
  user: admin
spec:
  hosts:
  - ssh:
      address: ${CONTROLLER_IP}
      user: ${SSH_USER}
      port: 22
      keyPath: ${SSH_PRIVATE_KEY_PATH}
    role: controller
    ## Note : 2026-02-15 transition using k0s Manifest Deployer to kubernetes provider in Terraform 
    # k0s reads manifests directory in alphabetical order
    # files:
    #   - name: metallb-installation
    #     src: https://raw.githubusercontent.com/metallb/metallb/v0.15.3/config/manifests/metallb-native.yaml
    #     dstDir: /var/lib/k0s/manifests/01-metallb-install.yaml
    #     perm: 0600
    #   - name: metallb-configuration
    #     src: ./metallb/metallb-config.yaml
    #     dstDir: /var/lib/k0s/manifests/02-metallb-config.yaml
    #     perm: 0600
   # bash-like expressions are supported in the configuration for environment variable substition
  - ssh:
      address: ${WORKER1_IP}
      user: ${SSH_USER}
      port: 22
      keyPath: ${SSH_PRIVATE_KEY_PATH}
    role: worker
  - ssh:
      address: ${WORKER2_IP}
      user: ${SSH_USER}
      port: 22
      keyPath: ${SSH_PRIVATE_KEY_PATH}
    role: worker
  - ssh:
      address: ${WORKER3_IP}
      user: ${SSH_USER}
      port: 22
      keyPath: ${SSH_PRIVATE_KEY_PATH}
    role: worker
  k0s:
    version: v1.34.2+k0s.0
    config:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      metadata:
        name: ${CLUSTER_NAME}
      spec:
        network:
          provider: calico
        ## Note : 2026-02-15 transition using k0s helm extension to helm provider in Terraform 
        # extensions: 
        #   helm: 
        #     repositories:
        #     - name: argo
        #       url: https://argoproj.github.io/argo-helm
        #     charts:
        #     - name: argo-cd
        #       chartname: argo/argo-cd
        #       version: "9.1.5"
        #       namespace: argocd
        #       order: 0
  options:
    wait:
      enabled: true
    drain:
      enabled: true
      gracePeriod: 2m0s
      timeout: 5m0s
      force: true
      ignoreDaemonSets: true
      deleteEmptyDirData: true
      podSelector: ""
      skipWaitForDeleteTimeout: 0s
    concurrency:
      limit: 30
      workerDisruptionPercent: 10
      uploads: 5
    evictTaint:
      enabled: false
      taint: k0sctl.k0sproject.io/evict=true
      effect: NoExecute
      controllerWorkers: false
