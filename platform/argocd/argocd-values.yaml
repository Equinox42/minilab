global:
  domain: argocd.40cat-not-found.tech

crds:
  keep: true

redis-ha:
  enabled: false

controller:
  replicas: 1

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

configs:
  cm:
    accounts.homepage: apiKey
  rbac:
    policy.csv: "g, homepage, role:readonly"
  params:
    server.insecure: true

server:
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: "cloudflare" 
      traefik.ingress.kubernetes.io/router.tls: "true"
    tls:
      - hosts:
          - argocd.40cat-not-found.tech
        secretName: argocd-tls-secret
