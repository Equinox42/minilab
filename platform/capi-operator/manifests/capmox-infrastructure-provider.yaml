apiVersion: v1
kind: Namespace
metadata:
  name: capmox-system
---
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: InfrastructureProvider
metadata:
  name: proxmox
  namespace: capmox-system
spec:
  version: v0.9.0
  configSecret:
    name: capmox-manager-credentials
    namespace: capmox-system
  fetchConfig:
    url: https://github.com/ionos-cloud/cluster-api-provider-proxmox/releases/download/v0.9.0/infrastructure-components.yaml
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: capmox-manager-credentials
  namespace: capmox-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore
  target:
    name: capmox-manager-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      metadata: 
        labels:
          platform.ionos.com/secret-type: "proxmox-credentials"
      data:
        url: '{{ .proxmoxEndpoint | trimSuffix "/" }}'
        token: 'capmox@pve!capi'
        secret: '{{ .CapmoxToken }}'
  data:
    - secretKey: proxmoxEndpoint
      remoteRef:
        key: proxmox_endpoint
    - secretKey: CapmoxToken
      remoteRef: 
        key: capmox_token
