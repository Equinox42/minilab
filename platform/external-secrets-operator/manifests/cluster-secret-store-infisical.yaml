apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical-store
spec:
  provider:
    infisical:
      hostAPI: https://infisical.40cat-not-found.tech
      auth:
        kubernetesAuthCredentials:
          identityId:
            key: identityId
            name: infisical-kubernetes-auth
            namespace: infisical-auth 
      secretsScope:
        projectSlug: kubernetes-secrets
        environmentSlug: prod
        secretsPath: /
